<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ts-monitor-sdk 浏览器示例</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #333; }
    h1 { font-size: 1.4em; margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 24px; font-size: 14px; }
    .section { margin-bottom: 24px; }
    .section h2 { font-size: 1em; margin-bottom: 8px; color: #555; }
    button { padding: 8px 16px; margin: 4px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; }
    button:hover { background: #f5f5f5; }
    button:active { background: #eee; }
    #log { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 8px; font-family: monospace; font-size: 13px; line-height: 1.6; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>@snailuu/ts-monitor-sdk 浏览器示例</h1>
  <p class="desc">打开 DevTools Network 面板查看上报请求，下方日志面板显示 SDK 事件</p>

  <div class="section">
    <h2>错误捕获</h2>
    <button id="btn-js-error">触发 JS 错误</button>
    <button id="btn-promise-error">触发 Promise 拒绝</button>
    <button id="btn-resource-error">触发资源加载错误</button>
  </div>

  <div class="section">
    <h2>HTTP 监控</h2>
    <button id="btn-fetch-ok">Fetch 正常请求</button>
    <button id="btn-fetch-fail">Fetch 失败请求</button>
    <button id="btn-xhr">XHR 请求</button>
  </div>

  <div class="section">
    <h2>行为追踪</h2>
    <button id="btn-route-hash">Hash 路由跳转</button>
    <button id="btn-route-push">pushState 跳转</button>
    <button id="btn-custom">手动上报事件</button>
  </div>

  <div class="section">
    <h2>SDK 控制</h2>
    <button id="btn-flush">手动 Flush</button>
    <button id="btn-destroy">销毁 SDK</button>
  </div>

  <div class="section">
    <h2>事件日志</h2>
    <div id="log">SDK 初始化中...\n</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
